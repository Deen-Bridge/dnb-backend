name: Keep Render Awake

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes UTC
  workflow_dispatch:        # Allows manual trigger

jobs:
  ping-render:
    runs-on: ubuntu-latest

    steps:
      - name: Curl your Render backend
        run: curl https://dnb-backend-api.onrender.com/ping
